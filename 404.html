<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - PetNudge</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to PetNudge homepage.">
  <link rel="icon" type="image/png" href="logo.webp">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="styles.css?v=3">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #fff5f2 0%, #e8f8f7 100%);
    }
    .error-page__icon {
      font-size: 6rem;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-size: 2.5rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    .error-page__subtitle {
      font-size: 1.2rem;
      color: #6c757d;
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .error-page__links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-page__link {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .error-page__link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    .error-page__link--primary {
      background: #FF6B35;
      color: #fff;
    }
    .error-page__link--secondary {
      background: #1a1a2e;
      color: #fff;
    }
    .error-page__logo {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.3rem;
      color: #FF6B35;
    }
    .error-page__logo img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <a href="/" class="error-page__logo">
      <img src="logo.webp" alt="PetNudge">
      PetNudge
    </a>
    <div class="error-page__icon">🐾</div>
    <h1 class="error-page__title">404 - Page Not Found</h1>
    <p class="error-page__subtitle">Looks like this page wandered off! Let's get you back on track.</p>
    <div class="error-page__links">
      <a href="/" class="error-page__link error-page__link--primary">Go Home</a>
      <a href="/blog/" class="error-page__link error-page__link--secondary">Read Our Blog</a>
      <a href="/shop.html" class="error-page__link error-page__link--secondary">Shop NFC Medals</a>
    </div>
  </div>
</body>
</html>
